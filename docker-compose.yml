services:
  db:
    image: mysql:8.0
    container_name: nova_aurora_container_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: fatec
      MYSQL_DATABASE: nova_aurora_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    container_name: nova_aurora_container_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=fatec
      - DB_NAME=nova_aurora_db
      - FLASK_DEBUG=true
    depends_on:
      - db

volumes:
  mysql_data: