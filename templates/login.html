    <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Acadêmico - Nova Aurora</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-[#003366] to-[#001122] min-h-screen flex items-center justify-center p-4 font-[Arial]">
    
    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 md:p-10 border border-gray-100">
        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center text-[#003366] text-2xl mb-4 shadow-inner">
                🔐
            </div>
            <h2 class="text-2xl font-extrabold text-[#003366] tracking-tight">Portal do Candidato</h2>
            <p class="text-gray-500 text-xs mt-1">Acesse sua inscrição usando seus dados</p>
        </div>

        {% if erro %}
        <div class="bg-red-50 border border-red-200 text-red-600 p-3 rounded-xl text-xs font-bold mb-6 text-center">
            ⚠️ {{ erro }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-2">E-mail Cadastrado</label>
                <input type="email" name="email" required placeholder="seu@email.com"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#003366] transition text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-2">Senha (Seu CPF)</label>
                <input type="text" name="cpf" required placeholder="000.000.000-00"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#003366] transition text-sm">
            </div>

            <button type="submit" 
                    class="w-full bg-[goldenrod] hover:bg-yellow-600 text-white font-bold py-3.5 rounded-xl shadow-md active:scale-[0.99] transition-all uppercase text-xs tracking-wider mt-2">
                Entrar no Sistema
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="/" class="text-xs text-[#003366] font-bold hover:underline">Voltar para a Home</a>
        </div>
    </div>

</body>
</html>
